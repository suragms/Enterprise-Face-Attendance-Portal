services:
  # 1. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: hexaattender_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-hexaattender}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - hexaattender_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hexaattender_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - hexaattender_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Django REST API Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hexaattender_backend
    restart: always
    env_file:
      - .env.prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - hexaattender_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/')\""]
      interval: 20s
      timeout: 8s
      retries: 5

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hexaattender_celery
    restart: always
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "--concurrency=2"]
    env_file:
      - .env.prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_volume:/app/media
    networks:
      - hexaattender_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hexaattender_celery_beat
    restart: always
    command: ["celery", "-A", "config", "beat", "-l", "INFO"]
    env_file:
      - .env.prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - hexaattender_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 3. React Frontend Container (Serving static web assets)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hexaattender_frontend
    restart: always
    networks:
      - hexaattender_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 5

  # 4. Front-facing Nginx Web Server / Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: hexaattender_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    networks:
      - hexaattender_network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 5

volumes:
  db_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  redis_data:
    driver: local

networks:
  hexaattender_network:
    driver: bridge
