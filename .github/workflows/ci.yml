name: HexaAttender v2 Enterprise CI

on:
  pull_request:
  push:
    branches: [main, master]

env:
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DJANGO_DEBUG: "True"
  USE_SQLITE: "True"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run Django checks
        run: python manage.py check
      - name: Run backend tests
        run: pytest -q --cov=apps --cov-report=term-missing:skip-covered
      - name: Run v2 enterprise phase tests
        run: pytest apps/core/tests/test_v2_enterprise_phases.py -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint --if-present
      - name: Build frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config --quiet
